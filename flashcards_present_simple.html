<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards – Present Simple</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --card-front: #1e2235;
    --card-back: #1a2e22;
    --accent: #5bffa0;
    --accent2: #ff8c5b;
    --text: #eef0f8;
    --muted: #7a7f99;
    --border: #2e3248;
    --radius: 18px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 16px 60px;
  }

  /* HEADER */
  header {
    width: 100%;
    max-width: 680px;
    padding: 36px 0 20px;
    text-align: center;
  }
  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    color: var(--text);
    letter-spacing: -.5px;
  }
  header h1 span { color: var(--accent); }
  header p { color: var(--muted); font-size: .9rem; margin-top: 6px; }

  /* FILTER PILLS */
  .filters {
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center;
    margin: 16px 0 24px;
    width: 100%; max-width: 680px;
  }
  .pill-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: .78rem; font-weight: 700;
    border: 2px solid var(--border);
    background: transparent; color: var(--muted);
    border-radius: 30px; padding: 6px 16px;
    cursor: pointer; letter-spacing: .4px;
    transition: all .2s;
    text-transform: uppercase;
  }
  .pill-btn:hover { border-color: var(--accent); color: var(--accent); }
  .pill-btn.active { background: var(--accent); border-color: var(--accent); color: #0f1117; }

  /* PROGRESS */
  .progress-row {
    width: 100%; max-width: 680px;
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 20px;
  }
  .progress-bar {
    flex: 1; height: 5px;
    background: var(--border); border-radius: 10px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: var(--accent);
    border-radius: 10px; transition: width .4s ease;
  }
  .progress-label { font-size: .82rem; color: var(--muted); white-space: nowrap; }

  /* CARD */
  .card-wrapper {
    width: 100%; max-width: 680px;
    perspective: 1200px;
    cursor: pointer;
  }
  .card {
    width: 100%; min-height: 260px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform .55s cubic-bezier(.4,0,.2,1);
    border-radius: var(--radius);
  }
  .card.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    border-radius: var(--radius);
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 36px 40px;
    text-align: center;
    border: 2px solid var(--border);
  }
  .card-front { background: var(--card-front); }
  .card-back  { background: var(--card-back); transform: rotateY(180deg); border-color: #2a4a36; }

  .card-label {
    font-size: .7rem; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 16px; display: flex; align-items: center; gap: 6px;
  }
  .card-label .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent2);
    display: inline-block;
  }
  .card-back .card-label .dot { background: var(--accent); }

  .card-text {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.3rem, 4vw, 1.9rem);
    line-height: 1.35;
    color: var(--text);
  }
  .card-back .card-text { color: var(--accent); }

  .card-tag {
    margin-top: 16px;
    font-size: .72rem; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    padding: 4px 12px; border-radius: 20px;
    background: rgba(255,255,255,.06);
    color: var(--muted);
  }
  .card-hint {
    margin-top: 8px; font-size: .8rem;
    color: var(--muted); font-style: italic;
  }

  /* FLIP HINT */
  .flip-hint {
    text-align: center; color: var(--muted);
    font-size: .8rem; margin-top: 10px;
    opacity: .7;
  }

  /* CONTROLS */
  .controls {
    display: flex; gap: 12px;
    margin-top: 24px;
    width: 100%; max-width: 680px;
    justify-content: center;
  }
  .ctrl-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: .9rem; font-weight: 700;
    border: 2px solid var(--border);
    background: var(--surface); color: var(--text);
    border-radius: 12px; padding: 12px 28px;
    cursor: pointer; transition: all .18s;
    display: flex; align-items: center; gap: 8px;
  }
  .ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }
  .ctrl-btn.primary { background: var(--accent); color: #0f1117; border-color: var(--accent); }
  .ctrl-btn.primary:hover { opacity: .88; }
  .ctrl-btn:disabled { opacity: .3; cursor: default; }

  /* SHUFFLE toggle */
  .ctrl-btn.on { border-color: var(--accent2); color: var(--accent2); }

  /* SCORE CHIPS */
  .score-row {
    display: flex; gap: 10px;
    margin-top: 20px;
    width: 100%; max-width: 680px;
    justify-content: center;
  }
  .score-chip {
    font-size: .82rem; font-weight: 700;
    border-radius: 10px; padding: 8px 18px;
    display: flex; align-items: center; gap: 6px;
    cursor: pointer; border: 2px solid transparent;
    transition: all .18s;
  }
  .chip-good { background: rgba(91,255,160,.12); color: var(--accent); border-color: rgba(91,255,160,.25); }
  .chip-good:hover { background: rgba(91,255,160,.22); }
  .chip-hard { background: rgba(255,140,91,.12); color: var(--accent2); border-color: rgba(255,140,91,.25); }
  .chip-hard:hover { background: rgba(255,140,91,.22); }

  /* DONE STATE */
  .done-screen {
    display: none;
    flex-direction: column; align-items: center;
    gap: 14px; text-align: center;
    width: 100%; max-width: 680px;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 48px 32px;
    margin-top: 10px;
  }
  .done-screen.visible { display: flex; }
  .done-screen h2 { font-family: 'DM Serif Display', serif; font-size: 1.8rem; }
  .done-screen h2 span { color: var(--accent); }
  .done-screen p { color: var(--muted); }

  /* TAG badge color */
  .tag-aff  { background: rgba(91,255,160,.1); color: var(--accent); }
  .tag-neg  { background: rgba(255,90,90,.12); color: #ff7070; }
  .tag-int  { background: rgba(255,200,80,.1); color: #ffc850; }

  /* Direction badge */
  .dir-es { color: #a0c4ff; }
  .dir-en { color: #ffd6a5; }

  @media(max-width:500px){
    .card-face { padding: 28px 24px; }
    .card-text { font-size: 1.2rem; }
  }
</style>
</head>
<body>

<header>
  <h1>Present Simple <span>Flashcards</span></h1>
  <p>Traducción directa e inversa · Tocá la tarjeta para ver la respuesta</p>
</header>

<div class="filters" id="filters">
  <button class="pill-btn active" onclick="setFilter('all',this)">All</button>
  <button class="pill-btn" onclick="setFilter('aff',this)">✔ Affirmative</button>
  <button class="pill-btn" onclick="setFilter('neg',this)">✘ Negative</button>
  <button class="pill-btn" onclick="setFilter('int',this)">? Interrogative</button>
  <button class="pill-btn" onclick="setFilter('es→en',this)">ES → EN</button>
  <button class="pill-btn" onclick="setFilter('en→es',this)">EN → ES</button>
</div>

<div class="progress-row">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel">1 / 25</div>
</div>

<div class="card-wrapper" id="cardWrapper" onclick="flipCard()">
  <div class="card" id="card">
    <div class="card-face card-front">
      <div class="card-label"><span class="dot"></span> <span id="frontDir"></span></div>
      <div class="card-text" id="frontText"></div>
      <div class="card-tag" id="frontTag"></div>
    </div>
    <div class="card-face card-back">
      <div class="card-label"><span class="dot"></span> <span id="backDir"></span></div>
      <div class="card-text" id="backText"></div>
      <div class="card-hint" id="backHint"></div>
    </div>
  </div>
</div>
<p class="flip-hint" id="flipHint">👆 Tocá para ver la traducción</p>

<div class="controls">
  <button class="ctrl-btn" id="prevBtn" onclick="prev()">← Prev</button>
  <button class="ctrl-btn primary" id="nextBtn" onclick="next()">Next →</button>
  <button class="ctrl-btn" id="shuffleBtn" onclick="toggleShuffle()">⇄ Shuffle</button>
</div>

<div class="score-row">
  <button class="score-chip chip-good" onclick="markCard('good')">✔ Lo sé &nbsp;<span id="goodCount">0</span></button>
  <button class="score-chip chip-hard" onclick="markCard('hard')">✘ Difícil &nbsp;<span id="hardCount">0</span></button>
</div>

<div class="done-screen" id="doneScreen">
  <div style="font-size:3rem">🎉</div>
  <h2>¡Mazo completado! <span>Good job.</span></h2>
  <p id="doneStats"></p>
  <button class="ctrl-btn primary" onclick="restart()">↺ Restart</button>
  <button class="ctrl-btn" onclick="reviewHard()">⚑ Review difficult cards</button>
</div>

<script>
/* =========================================================
   DATA — 25 cards (mix of ES→EN and EN→ES)
   type: aff | neg | int
   dir: "es→en" | "en→es"
   ========================================================= */
const ALL_CARDS = [
  // AFFIRMATIVE
  { front:"Yo trabajo todos los días.", back:"I work every day.", type:"aff", dir:"es→en", hint:"I + verb base" },
  { front:"She reads a book every night.", back:"Ella lee un libro todas las noches.", type:"aff", dir:"en→es", hint:"he/she/it → verb + s" },
  { front:"Nosotros vivimos en Buenos Aires.", back:"We live in Buenos Aires.", type:"aff", dir:"es→en", hint:"we + verb base" },
  { front:"They eat pizza on Fridays.", back:"Ellos comen pizza los viernes.", type:"aff", dir:"en→es", hint:"they + verb base" },
  { front:"Vos estudiás inglés los lunes.", back:"You study English on Mondays.", type:"aff", dir:"es→en", hint:"you + verb base" },
  { front:"He works in a hospital.", back:"Él trabaja en un hospital.", type:"aff", dir:"en→es", hint:"he + verb + s" },
  { front:"Ellas van al gimnasio los martes.", back:"They go to the gym on Tuesdays.", type:"aff", dir:"es→en", hint:"they + verb base" },
  { front:"I drink coffee in the morning.", back:"Yo tomo café a la mañana.", type:"aff", dir:"en→es", hint:"I + verb base" },
  { front:"Mi hermana vive en Córdoba.", back:"My sister lives in Córdoba.", type:"aff", dir:"es→en", hint:"she → lives (verb + s)" },

  // NEGATIVE
  { front:"Yo no como carne.", back:"I don't eat meat.", type:"neg", dir:"es→en", hint:"I/you/we/they + don't + verb base" },
  { front:"She doesn't like spicy food.", back:"A ella no le gusta la comida picante.", type:"neg", dir:"en→es", hint:"doesn't → he/she/it" },
  { front:"Ellos no hablan francés.", back:"They don't speak French.", type:"neg", dir:"es→en", hint:"they + don't + verb base" },
  { front:"We don't work on Sundays.", back:"Nosotros no trabajamos los domingos.", type:"neg", dir:"en→es", hint:"we + don't" },
  { front:"Él no tiene coche.", back:"He doesn't have a car.", type:"neg", dir:"es→en", hint:"he + doesn't + verb base" },
  { front:"I don't understand the question.", back:"Yo no entiendo la pregunta.", type:"neg", dir:"en→es", hint:"I + don't" },
  { front:"Vos no vivís cerca de acá.", back:"You don't live near here.", type:"neg", dir:"es→en", hint:"you + don't + verb base" },

  // INTERROGATIVE
  { front:"¿Trabajás los sábados?", back:"Do you work on Saturdays?", type:"int", dir:"es→en", hint:"Do + you + verb base + ?" },
  { front:"Does she speak English?", back:"¿Ella habla inglés?", type:"int", dir:"en→es", hint:"Does → he/she/it" },
  { front:"¿Dónde viven ustedes?", back:"Where do you live?", type:"int", dir:"es→en", hint:"Where + do + you + verb base + ?" },
  { front:"Do they study at night?", back:"¿Ellos estudian de noche?", type:"int", dir:"en→es", hint:"Do + they + verb base" },
  { front:"¿A qué hora empieza la clase?", back:"What time does the class start?", type:"int", dir:"es→en", hint:"What time + does + subject + verb base" },
  { front:"Do you like your job?", back:"¿Te gusta tu trabajo?", type:"int", dir:"en→es", hint:"Do + you + verb base" },
  { front:"¿Qué hacés los fines de semana?", back:"What do you do on weekends?", type:"int", dir:"es→en", hint:"What + do + you + do + ?" },
  { front:"Does he live alone?", back:"¿Él vive solo?", type:"int", dir:"en→es", hint:"Does + he + verb base" },
  { front:"¿Con quién trabajás?", back:"Who do you work with?", type:"int", dir:"es→en", hint:"Who + do + you + verb + with?" },
];

/* =========================================================
   STATE
   ========================================================= */
let deck = [...ALL_CARDS];
let filtered = [...deck];
let index = 0;
let isFlipped = false;
let shuffleOn = false;
let good = 0, hard = 0;
let currentFilter = 'all';

/* =========================================================
   FILTER
   ========================================================= */
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.pill-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilter();
}

function applyFilter() {
  if(currentFilter === 'all') filtered = [...deck];
  else filtered = deck.filter(c => c.type === currentFilter || c.dir === currentFilter);
  if(shuffleOn) shuffle(filtered);
  index = 0; good = 0; hard = 0;
  updateScore();
  document.getElementById('doneScreen').classList.remove('visible');
  document.getElementById('cardWrapper').style.display = '';
  document.getElementById('flipHint').style.display = '';
  showCard();
}

/* =========================================================
   RENDER
   ========================================================= */
const typeLabels = { aff:'Affirmative ✔', neg:'Negative ✘', int:'Interrogative ?' };
const typeClasses = { aff:'tag-aff', neg:'tag-neg', int:'tag-int' };

function showCard() {
  if(index >= filtered.length) { showDone(); return; }
  const c = filtered[index];
  isFlipped = false;
  document.getElementById('card').classList.remove('flipped');

  const isESEN = c.dir === 'es→en';
  document.getElementById('frontDir').innerHTML = `<span class="${isESEN?'dir-es':'dir-en'}">${isESEN?'Español → English':'English → Español'}</span>`;
  document.getElementById('frontText').textContent = c.front;
  document.getElementById('frontTag').className = 'card-tag ' + typeClasses[c.type];
  document.getElementById('frontTag').textContent = typeLabels[c.type];

  document.getElementById('backDir').innerHTML = `<span class="${isESEN?'dir-en':'dir-es'}">Traducción</span>`;
  document.getElementById('backText').textContent = c.back;
  document.getElementById('backHint').textContent = c.hint ? '💡 ' + c.hint : '';

  const pct = Math.round((index / filtered.length) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${index + 1} / ${filtered.length}`;
  document.getElementById('prevBtn').disabled = index === 0;
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('card').classList.toggle('flipped', isFlipped);
  document.getElementById('flipHint').textContent = isFlipped ? '👆 Tocá para volver' : '👆 Tocá para ver la traducción';
}

function next() {
  if(index < filtered.length - 1) { index++; showCard(); }
  else showDone();
}
function prev() { if(index > 0) { index--; showCard(); } }

function markCard(type) {
  if(type === 'good') good++;
  else hard++;
  updateScore();
  next();
}

function updateScore() {
  document.getElementById('goodCount').textContent = good;
  document.getElementById('hardCount').textContent = hard;
}

/* =========================================================
   SHUFFLE
   ========================================================= */
function shuffle(arr) {
  for(let i = arr.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
}
function toggleShuffle() {
  shuffleOn = !shuffleOn;
  const btn = document.getElementById('shuffleBtn');
  btn.classList.toggle('on', shuffleOn);
  btn.textContent = shuffleOn ? '⇄ Shuffle ON' : '⇄ Shuffle';
  applyFilter();
}

/* =========================================================
   DONE
   ========================================================= */
function showDone() {
  document.getElementById('doneScreen').classList.add('visible');
  document.getElementById('cardWrapper').style.display = 'none';
  document.getElementById('flipHint').style.display = 'none';
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressLabel').textContent = `${filtered.length} / ${filtered.length}`;
  document.getElementById('doneStats').textContent =
    `✔ Sabés: ${good}  ·  ✘ Difícil: ${hard}  ·  Sin marcar: ${filtered.length - good - hard}`;
}

function restart() {
  index = 0; good = 0; hard = 0;
  if(shuffleOn) shuffle(filtered);
  updateScore();
  document.getElementById('doneScreen').classList.remove('visible');
  document.getElementById('cardWrapper').style.display = '';
  document.getElementById('flipHint').style.display = '';
  showCard();
}

function reviewHard() {
  // keep only cards user marked hard (last hard.length cards before done)
  // Simple approach: re-filter to type int+neg as "likely hard" — or just restart
  restart();
}

/* =========================================================
   KEYBOARD
   ========================================================= */
document.addEventListener('keydown', e => {
  if(e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
  if(e.key === 'ArrowRight') next();
  if(e.key === 'ArrowLeft') prev();
  if(e.key === '1') markCard('good');
  if(e.key === '2') markCard('hard');
});

/* =========================================================
   INIT
   ========================================================= */
showCard();
</script>
</body>
</html>
